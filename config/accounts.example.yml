actual:
  serverURL: "http://localhost:5006"
  password: "your-password"
  budgetId: "your-sync-id"  # Found in Actual Budget → Settings → Advanced → Sync ID
  encryptionPassword: ""    # Optional — only if you enabled end-to-end encryption in Actual

# Map account keys to Actual Budget account UUIDs.
# Needed for all CLI-imported accounts (CSV and OFX).
splitwise:
  apiKey: "your-splitwise-api-key"  # From https://secure.splitwise.com/apps

accounts:
  td_chequing: "actual-account-uuid"       # OFX import via CLI
  td_visa: "actual-account-uuid"           # OFX import via CLI
  cibc_chequing: "actual-account-uuid"     # OFX import via CLI
  amex: "actual-account-uuid"              # OFX import via CLI
  eq_savings: "actual-account-uuid"
  ws_chequing: "actual-account-uuid"
  ws_credit: "actual-account-uuid"
  ws_rrsp: "actual-account-uuid"                # Off-budget tracking account (holdings)
  ws_tfsa: "actual-account-uuid"                # Off-budget tracking account (holdings)
  ws_fhsa: "actual-account-uuid"                # Off-budget tracking account (holdings)
  ws_non_registered: "actual-account-uuid"      # Off-budget tracking account (holdings)
  splitwise_receivable: "actual-account-uuid"   # Off-budget tracking account
  splitwise_payable: "actual-account-uuid"      # Off-budget tracking account
